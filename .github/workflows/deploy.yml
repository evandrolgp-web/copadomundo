name: Deploy GitHub Pages

# Publica o site estático no GitHub Pages a cada push na branch de produção.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Permissões necessárias para o deploy do Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy por vez, sem cancelar execuções em andamento
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato (site na raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
